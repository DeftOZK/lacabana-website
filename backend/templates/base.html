{% load static %}
<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}La Cabaña{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/header.css' %}?v=header-world-cup-flyer-layout">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}?v=footer-gutter">
    <link rel="icon" type="image/x-icon" href="{% static 'img/logos/favicon.ico' %}">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6C825H0TP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-C6C825H0TP');
    </script>

    {% block extra_css %}{% endblock %}
</head>

<body>

    {% include 'partials/site_header.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'partials/site_footer.html' %}

    {% block extra_js %}{% endblock %}

</body>
</html>
