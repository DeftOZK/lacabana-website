{% load static %}
<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta | La Cabaña</title>
    <link rel="stylesheet" href="{% static 'css/header.css' %}?v=header-general">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}?v=footer-general">
    <link rel="stylesheet" href="{% static 'css/cuenta.css' %}?v=account-tabs">
</head>
<body>
    {% include 'partials/site_header.html' %}

    <main class="account-page">
        <section class="account-shell">
            <div class="account-card" data-account-tabs>
                <div class="account-tabs" role="tablist" aria-label="Acceso a cuenta">
                    <button type="button" class="account-tab is-active" data-account-tab="login" role="tab" aria-selected="true">
                        Iniciar sesión
                    </button>
                    <button type="button" class="account-tab" data-account-tab="signup" role="tab" aria-selected="false">
                        Crear cuenta
                    </button>
                </div>

                <form class="account-form is-active" data-account-panel="login" aria-label="Formulario de inicio de sesión">
                    <h2>Bienvenido de vuelta</h2>

                    <label>
                        Correo electrónico
                        <input type="email" name="email" autocomplete="email" placeholder="correo@ejemplo.com" required>
                    </label>

                    <label>
                        Contraseña
                        <input type="password" name="password" autocomplete="current-password" placeholder="Tu contraseña" required>
                    </label>

                    <a class="account-link" href="#">¿Olvidaste tu contraseña?</a>
                    <button class="account-btn" type="submit">Iniciar sesión</button>

                    <p class="account-switch">
                        ¿No tienes cuenta?
                        <button type="button" data-account-switch="signup">Crear cuenta</button>
                    </p>

                    <div class="account-socials" aria-label="Accesos sociales visuales">
                        <button type="button" class="social-login social-login--apple">
                            <svg class="social-icon" viewBox="0 0 1024 1024" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M747.4 535.7c-.4-68.2 30.5-119.6 92.9-157.5-34.9-50-87.7-77.5-157.3-82.8-65.9-5.2-138 38.4-164.4 38.4-27.9 0-91.7-36.6-141.9-36.6C273.1 298.8 163 379.8 163 544.6c0 48.7 8.9 99 26.7 150.8 23.8 68.2 109.6 235.3 199.1 232.6 46.8-1.1 79.9-33.2 140.8-33.2 59.1 0 89.7 33.2 141.9 33.2 90.3-1.3 167.9-153.2 190.5-221.6-121.1-57.1-114.6-167.2-114.6-170.7zm-105.1-305c50.7-60.2 46.1-115 44.6-134.7-44.8 2.6-96.6 30.5-126.1 64.8-32.5 36.8-51.6 82.3-47.5 133.6 48.4 3.7 92.6-21.2 129-63.7z"></path>
                            </svg>
                            <span>Continuar con Apple</span>
                        </button>
                        <button type="button" class="social-login social-login--google">
                            <svg class="social-icon" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
                                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24c0-1.341-.138-2.65-.389-3.917z"></path>
                            </svg>
                            <span>Continuar con Google</span>
                        </button>
                    </div>
                </form>

                <form class="account-form" data-account-panel="signup" aria-label="Formulario para crear cuenta">
                    <h2>Crea tu cuenta</h2>

                    <label>
                        Nombre completo
                        <input type="text" name="name" autocomplete="name" placeholder="Tu nombre completo" required>
                    </label>

                    <label>
                        Correo electrónico
                        <input type="email" name="signup_email" autocomplete="email" placeholder="correo@ejemplo.com" required>
                    </label>

                    <label>
                        Teléfono opcional
                        <input type="tel" name="phone" autocomplete="tel" placeholder="664 000 0000">
                    </label>

                    <label>
                        Contraseña
                        <input type="password" name="signup_password" autocomplete="new-password" placeholder="Crea una contraseña" required>
                    </label>

                    <label>
                        Confirmar contraseña
                        <input type="password" name="password_confirm" autocomplete="new-password" placeholder="Repite tu contraseña" required>
                    </label>

                    <button class="account-btn" type="submit">Crear cuenta</button>

                    <p class="account-switch">
                        ¿Ya tienes cuenta?
                        <button type="button" data-account-switch="login">Iniciar sesión</button>
                    </p>
                </form>
            </div>
        </section>
    </main>

    {% include 'partials/site_footer.html' %}
    <script src="{% static 'js/cuenta.js' %}?v=account-tabs"></script>
</body>
</html>
